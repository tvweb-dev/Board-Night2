<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar"></header>

  <div class="container">
    <h1>Your Groups</h1>
    <p class="subtle">Create a group. It appears below from the local API.</p>

    <div class="card">
      <h3>Create a board game group</h3>
      <label for="groupName">Group name</label>
      <input id="groupName" placeholder="e.g. Friday Night Catan" />
      <div class="btn-row">
        <button class="btn" id="createGroupBtn">Create group</button>
      </div>
    </div>

    <h2>Groups</h2>
    <div id="groupList" class="grid"></div>

    <footer class="note">Connected to the Board Night Express API.</footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(function () {
      renderTopbar();

      async function renderGroups() {
        const list = document.getElementById("groupList");
        list.innerHTML = '<p class="empty">Loading groups...</p>';

        const groups = await DB.getGroups();
        if (!groups.length) {
          list.innerHTML = '<p class="empty">No groups yet - create one above.</p>';
          return;
        }

        const cards = await Promise.all(groups.map(async function (g) {
          const memberCount = (await DB.getMembers(g.id)).length;
          const eventCount = (await DB.getEvents(g.id)).length;

          return `<a class="card" style="text-decoration:none;color:inherit;display:block;"
                     href="group.html?group=${encodeURIComponent(g.id)}">
                    <h3>${esc(g.name)}</h3>
                    <p class="subtle">${memberCount} member(s) - ${eventCount} event(s)</p>
                  </a>`;
        }));

        list.innerHTML = cards.join("");
      }

      document.getElementById("createGroupBtn").addEventListener("click", async function () {
        const name = document.getElementById("groupName").value.trim();
        if (!name) {
          alert("Please enter a group name.");
          return;
        }

        try {
          await DB.createGroup(name);
          document.getElementById("groupName").value = "";
          await renderGroups();
        } catch (error) {
          alert(error.message);
        }
      });

      renderGroups().catch(function (error) {
        document.getElementById("groupList").innerHTML =
          '<p class="empty">' + esc(error.message) + '</p>';
      });
    });
  </script>
</body>
</html>
