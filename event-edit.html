<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night - Create Event</title>
  <link rel="stylesheet" href="https://use.typekit.net/oga8xpj.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar"></header>

  <div class="container">
    <p><a id="backLink" href="dashboard.html">&larr; Back</a></p>
    <h1 id="pageTitle">Create event</h1>
    <p class="subtle">Set time, date and location for a group event.</p>

    <div class="card">
      <label for="title">Event title</label>
      <input id="title" placeholder="e.g. Catan Night" />

      <label for="date">Date</label>
      <input id="date" type="date" />

      <label for="time">Time</label>
      <input id="time" type="time" />

      <label for="location">Location</label>
      <input id="location" placeholder="e.g. Sam's place" />

      <label for="description">Event Description</label>
      <textarea id="description" maxlength="2000" placeholder="Tell your group what the event is about..."></textarea>
      <p class="character-counter" id="descriptionCounter">0 / 2000</p>

      <div class="btn-row">
        <button class="btn" id="saveBtn">Save event</button>
        <a class="btn secondary" id="cancelBtn" href="dashboard.html">Cancel</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(async function () {
      renderTopbar();
      const groupId = qs("group");
      const eventId = qs("event");
      const existing = eventId ? await DB.getEvent(eventId) : null;

      const back = existing
        ? "event.html?event=" + encodeURIComponent(existing.id)
        : (groupId ? "group.html?group=" + encodeURIComponent(groupId) : "dashboard.html");

      document.getElementById("backLink").href = back;
      document.getElementById("cancelBtn").href = back;

      if (existing) {
        document.getElementById("pageTitle").textContent = "Edit event";
        document.getElementById("title").value = existing.title;
        document.getElementById("date").value = existing.date;
        document.getElementById("time").value = existing.time;
        document.getElementById("location").value = existing.location;
        document.getElementById("description").value = existing.description || "";
        document.getElementById("descriptionCounter").textContent = (existing.description || "").length + " / 2000";
      }

      const descriptionInput = document.getElementById("description");
      const descriptionCounter = document.getElementById("descriptionCounter");
      descriptionInput.addEventListener("input", function () {
        descriptionCounter.textContent = descriptionInput.value.length + " / 2000";
      });

      document.getElementById("saveBtn").addEventListener("click", async function () {
        const saveButton = document.getElementById("saveBtn");
        const fields = {
          title: document.getElementById("title").value.trim(),
          date: document.getElementById("date").value,
          time: document.getElementById("time").value,
          location: document.getElementById("location").value.trim(),
          description: descriptionInput.value.trim()
        };

        if (!fields.title || !fields.date || !fields.location) {
          alert("Please fill in at least a title, date and location.");
          return;
        }

        if (fields.description.length > 2000) {
          alert("Event Description must be 2000 characters or fewer.");
          return;
        }

        saveButton.disabled = true;
        saveButton.textContent = "Saving...";
        try {
          let saved;
          if (existing) {
            saved = await DB.updateEvent(existing.id, fields);
          } else {
            fields.groupId = groupId;
            saved = await DB.createEvent(fields);
          }

          document.getElementById("title").value = "";
          document.getElementById("date").value = "";
          document.getElementById("time").value = "";
          document.getElementById("location").value = "";
          descriptionInput.value = "";
          descriptionCounter.textContent = "0 / 2000";
          alert(existing ? "Event updated successfully." : "Event created successfully.");
          window.location.href = "event.html?event=" + encodeURIComponent(saved.id);
        } catch (error) {
          alert(error.message);
          saveButton.disabled = false;
          saveButton.textContent = "Save event";
        }
      });
    });
  </script>
</body>
</html>
