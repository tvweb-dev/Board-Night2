<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night - Group</title>
  <link rel="stylesheet" href="https://use.typekit.net/oga8xpj.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar"></header>

  <div class="container">
    <p><a href="dashboard.html">&larr; Back to dashboard</a></p>
    <h1 id="groupName">Group</h1>

    <div class="card">
      <h3>Invite a member</h3>
      <label for="memberName">Existing user ID or display name</label>
      <input id="memberName" placeholder="e.g. 2" />
      <label for="memberEmail">Email for new member</label>
      <input id="memberEmail" type="email" placeholder="alex@example.com" />
      <div class="btn-row">
        <button class="btn" id="addMemberBtn">Add member</button>
      </div>
    </div>

    <h2>Members</h2>
    <div class="card"><ul class="plain" id="memberList"></ul></div>

    <h2>Events</h2>
    <p><a class="btn" id="newEventBtn" href="#">+ Create event</a></p>
    <div id="eventList"></div>

    <footer class="note">Connected to the Board Night Express API.</footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(async function () {
      renderTopbar();
      const groupId = qs("group");
      const group = await DB.getGroup(groupId);

      if (!group) {
        document.querySelector(".container").innerHTML =
          '<p class="empty">Group not found. <a href="dashboard.html">Go back</a></p>';
        return;
      }

      document.getElementById("groupName").textContent = group.name;
      document.getElementById("newEventBtn").href =
        "event-edit.html?group=" + encodeURIComponent(groupId);

      async function renderMembers() {
        const ul = document.getElementById("memberList");
        const members = await DB.getMembers(groupId);

        ul.innerHTML = members.length ? members.map(function (m) {
          const isHost = String(m.id) === String(group.hostId);
          return `<li><span>${esc(m.name)} ${isHost ? '<span class="subtle">(host)</span>' : ""}</span>
                      <span class="subtle">${esc(m.email || "")}</span></li>`;
        }).join("") : '<li class="empty">No members yet.</li>';
      }

      async function renderEvents() {
        const wrap = document.getElementById("eventList");
        const events = await DB.getEvents(groupId);

        if (!events.length) {
          wrap.innerHTML = '<p class="empty">No events yet.</p>';
          return;
        }

        const cards = await Promise.all(events.map(async function (e) {
          const going = (await DB.getRsvps(e.id)).filter(function (r) {
            return r.status === "going";
          }).length;

          return `<a class="card" style="text-decoration:none;color:inherit;display:block;"
                     href="event.html?event=${encodeURIComponent(e.id)}">
                    <h3>${esc(e.title)} <span class="pill ${e.cancelled ? "cancelled" : "active"}">${esc(e.status)}</span></h3>
                    <p class="subtle">${prettyDate(e.date)} - ${esc(e.time || "")} - ${esc(e.location || "")}</p>
                    ${e.description ? `<p class="event-description-preview" data-event-description="${encodeURIComponent(String(e.id))}"></p>` : ""}
                    <p><span class="count-badge">${going}</span> going</p>
                    <span class="subtle">View details</span>
                  </a>`;
        }));

        wrap.innerHTML = cards.join("");
        events.forEach(function (event) {
          if (!event.description) return;
          const preview = wrap.querySelector('[data-event-description="' + CSS.escape(String(event.id)) + '"]');
          if (preview) preview.textContent = event.description;
        });
      }

      document.getElementById("addMemberBtn").addEventListener("click", async function () {
        const name = document.getElementById("memberName").value.trim();
        const email = document.getElementById("memberEmail").value.trim();

        if (!name && !email) {
          alert("Please enter an existing user ID or an email.");
          return;
        }

        try {
          await DB.addMember(groupId, name, email);
          document.getElementById("memberName").value = "";
          document.getElementById("memberEmail").value = "";
          await renderMembers();
        } catch (error) {
          alert(error.message);
        }
      });

      await renderMembers();
      await renderEvents();
    });
  </script>
</body>
</html>
