<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night — Group</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar"></header>

  <div class="container">
    <p><a href="dashboard.html">&larr; Back to dashboard</a></p>
    <h1 id="groupName">Group</h1>

    <div class="card">
      <h3>Invite a member <span class="subtle">(Story 2)</span></h3>
      <label for="memberName">Name</label>
      <input id="memberName" placeholder="e.g. Alex" />
      <label for="memberEmail">Email (optional)</label>
      <input id="memberEmail" type="email" placeholder="alex@example.com" />
      <div class="btn-row">
        <button class="btn" id="addMemberBtn">Add member</button>
      </div>
    </div>

    <h2>Members</h2>
    <div class="card"><ul class="plain" id="memberList"></ul></div>

    <h2>Events</h2>
    <p><a class="btn" id="newEventBtn" href="#">+ Create event</a></p>
    <div id="eventList"></div>

    <footer class="note">Scaffold page for Stories 2 &amp; 3.</footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(function () {
      renderTopbar();
      const groupId = qs("group");
      const group = DB.getGroup(groupId);

      if (!group) {
        document.querySelector(".container").innerHTML =
          '<p class="empty">Group not found. <a href="dashboard.html">Go back</a></p>';
        return;
      }

      document.getElementById("groupName").textContent = group.name;
      document.getElementById("newEventBtn").href =
        "event-edit.html?group=" + encodeURIComponent(groupId);

      function renderMembers() {
        const ul = document.getElementById("memberList");
        const members = DB.getMembers(groupId);
        ul.innerHTML = members.map(function (m) {
          const isHost = m.id === group.hostId;
          return `<li><span>${esc(m.name)} ${isHost ? '<span class="subtle">(host)</span>' : ""}</span>
                      <span class="subtle">${esc(m.email || "")}</span></li>`;
        }).join("");
      }

      function renderEvents() {
        const wrap = document.getElementById("eventList");
        const events = DB.getEvents(groupId);
        if (!events.length) {
          wrap.innerHTML = '<p class="empty">No events yet.</p>';
          return;
        }
        wrap.innerHTML = events.map(function (e) {
          const going = DB.getRsvps(e.id).filter(function (r) { return r.status === "going"; }).length;
          return `<a class="card" style="text-decoration:none;color:inherit;display:block;"
                     href="event.html?event=${encodeURIComponent(e.id)}">
                    <h3>${esc(e.title)} ${e.cancelled ? '<span class="pill cancelled">Cancelled</span>' : ""}</h3>
                    <p class="subtle">${prettyDate(e.date)} · ${esc(e.time || "")} · ${esc(e.location || "")}</p>
                    <p><span class="count-badge">${going}</span> going</p>
                  </a>`;
        }).join("");
      }

      document.getElementById("addMemberBtn").addEventListener("click", function () {
        const name = document.getElementById("memberName").value.trim();
        const email = document.getElementById("memberEmail").value.trim();
        if (!name) { alert("Please enter a name."); return; }
        DB.addMember(groupId, name, email);
        document.getElementById("memberName").value = "";
        document.getElementById("memberEmail").value = "";
        renderMembers();
      });

      renderMembers();
      renderEvents();
    });
  </script>
</body>
</html>
