<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night — RSVP</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container" style="max-width:460px;margin-top:6vh;">
    <h1 style="text-align:center;">🎲 You're invited!</h1>
    <p class="subtle" style="text-align:center;">
      Story 5: this is the page an emailed invite link opens. The host sends a link
      like <code>rsvp.html?event=EVENT_ID</code>.
    </p>

    <div class="card" id="card">
      <!-- filled by script -->
    </div>

    <footer class="note">Scaffold — real email sending is a Sprint 2 task.</footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(function () {
      const eventId = qs("event");
      const ev = DB.getEvent(eventId);
      const card = document.getElementById("card");

      if (!ev) {
        card.innerHTML = '<p class="empty">This invite link is invalid or the event was removed.</p>';
        return;
      }
      if (ev.cancelled) {
        card.innerHTML = '<div class="notice"><strong>This event has been cancelled.</strong></div>';
        return;
      }

      const me = DB.currentUser();
      const mine = DB.getRsvpFor(ev.id, me.id);

      card.innerHTML = `
        <h3>${esc(ev.title)}</h3>
        <p class="subtle">${prettyDate(ev.date)} · ${esc(ev.time || "")} · ${esc(ev.location || "")}</p>
        <p>${esc(ev.description || "")}</p>
        <label for="rsvpSelect">Can you make it?</label>
        <select id="rsvpSelect">
          <option value="going">Going</option>
          <option value="maybe">Maybe</option>
          <option value="no">Can't make it</option>
        </select>
        <div class="btn-row">
          <button class="btn" id="saveBtn">Send RSVP</button>
          <a class="btn secondary" href="event.html?event=${encodeURIComponent(ev.id)}">View event</a>
        </div>`;

      if (mine) document.getElementById("rsvpSelect").value = mine.status;

      document.getElementById("saveBtn").addEventListener("click", function () {
        DB.setRsvp(ev.id, me.id, document.getElementById("rsvpSelect").value);
        card.innerHTML = '<div class="notice"><strong>Thanks — your RSVP is in!</strong></div>' +
          '<div class="btn-row"><a class="btn" href="event.html?event=' +
          encodeURIComponent(ev.id) + '">See who\'s coming</a></div>';
      });
    });
  </script>
</body>
</html>
