<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night - Event</title>
  <link rel="stylesheet" href="https://use.typekit.net/oga8xpj.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar"></header>

  <div class="container">
    <p><a id="backLink" href="dashboard.html">&larr; Back to group</a></p>

    <div id="cancelledBanner"></div>

    <h1 id="eventTitle">Event</h1>
    <p class="subtle" id="eventMeta"></p>
    <p id="eventDesc"></p>

    <div class="card">
      <h3>Your RSVP</h3>
      <label for="rsvpSelect">Are you going?</label>
      <select id="rsvpSelect">
        <option value="going">Going</option>
        <option value="maybe">Maybe</option>
        <option value="no">Can't make it</option>
      </select>
      <div class="btn-row">
        <button class="btn" id="saveRsvpBtn">Save RSVP</button>
      </div>
    </div>

    <h2>Who's coming <span class="count-badge" id="goingCount">0</span> going</h2>
    <div class="card">
      <h3>Going</h3><ul class="plain" id="listGoing"></ul>
      <h3>Maybe</h3><ul class="plain" id="listMaybe"></ul>
      <h3>Can't make it</h3><ul class="plain" id="listNo"></ul>
    </div>

    <div class="card" id="hostBox">
      <h3>Host controls</h3>
      <div class="btn-row">
        <a class="btn secondary" id="editBtn" href="#">Edit event</a>
        <a class="btn secondary" id="emailBtn" href="#">Send email invites</a>
        <button class="btn secondary" id="cancelEventBtn">Cancel event</button>
      </div>
      <label for="hostSelect" style="margin-top:14px;">Change host to</label>
      <select id="hostSelect"></select>
      <div class="btn-row">
        <button class="btn secondary" id="changeHostBtn">Change host</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(async function () {
      renderTopbar();
      const eventId = qs("event");
      const ev = await DB.getEvent(eventId);

      if (!ev) {
        document.querySelector(".container").innerHTML =
          '<p class="empty">Event not found. <a href="dashboard.html">Go back</a></p>';
        return;
      }

      const me = DB.currentUser();
      const amHost = String(ev.hostId) === String(me.id);

      document.getElementById("backLink").href = "group.html?group=" + encodeURIComponent(ev.groupId);
      document.getElementById("editBtn").href = "event-edit.html?event=" + encodeURIComponent(ev.id);
      document.getElementById("emailBtn").href = "rsvp.html?event=" + encodeURIComponent(ev.id);

      function renderHeader() {
        document.getElementById("eventTitle").textContent = ev.title;
        document.getElementById("eventMeta").textContent =
          prettyDate(ev.date) + " - " + (ev.time || "") + " - " + (ev.location || "");
        document.getElementById("eventDesc").textContent = ev.description || "";
        document.getElementById("cancelledBanner").innerHTML = ev.cancelled
          ? '<div class="notice"><strong>This event is cancelled.</strong></div>' : "";
      }

      async function renderWhosComing() {
        const rsvps = await DB.getRsvps(ev.id);
        const buckets = { going: [], maybe: [], no: [] };

        rsvps.forEach(function (r) {
          if (buckets[r.status]) {
            buckets[r.status].push(r.userName || r.userEmail || `User ${r.userId}`);
          }
        });

        function fill(id, names) {
          const ul = document.getElementById(id);
          ul.innerHTML = names.length
            ? names.map(function (n) { return "<li>" + esc(n) + "</li>"; }).join("")
            : '<li class="empty">Nobody yet</li>';
        }

        fill("listGoing", buckets.going);
        fill("listMaybe", buckets.maybe);
        fill("listNo", buckets.no);
        document.getElementById("goingCount").textContent = buckets.going.length;
      }

      async function renderMyRsvp() {
        const mine = await DB.getRsvpFor(ev.id, me.id);
        if (mine) document.getElementById("rsvpSelect").value = mine.status;
      }

      async function renderHostControls() {
        const box = document.getElementById("hostBox");
        if (!amHost) {
          box.style.display = "none";
          return;
        }

        const cancelButton = document.getElementById("cancelEventBtn");
        cancelButton.disabled = true;
        cancelButton.textContent = "Cancel not in MVP API";

        const sel = document.getElementById("hostSelect");
        const members = (await DB.getMembers(ev.groupId)).filter(function (m) {
          return String(m.id) !== String(ev.hostId);
        });

        sel.innerHTML = members.length
          ? members.map(function (m) { return '<option value="' + m.id + '">' + esc(m.name) + "</option>"; }).join("")
          : '<option value="">No other members</option>';
      }

      document.getElementById("saveRsvpBtn").addEventListener("click", async function () {
        try {
          await DB.setRsvp(ev.id, me.id, document.getElementById("rsvpSelect").value);
          await renderWhosComing();
          alert("RSVP saved!");
        } catch (error) {
          alert(error.message);
        }
      });

      document.getElementById("cancelEventBtn").addEventListener("click", async function () {
        await DB.cancelEvent(ev.id);
      });

      document.getElementById("changeHostBtn").addEventListener("click", async function () {
        await DB.changeHost(ev.id, document.getElementById("hostSelect").value);
      });

      renderHeader();
      await renderWhosComing();
      await renderMyRsvp();
      await renderHostControls();
    });
  </script>
</body>
</html>
