<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Night — Sign In</title>
  <link rel="stylesheet" href="https://use.typekit.net/oga8xpj.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container" style="max-width:420px;margin-top:8vh;">
    <h1 style="text-align:center;">🎲 Board Night</h1>
    <p class="subtle" style="text-align:center;">Plan game nights. Invite players. See who's coming.</p>

    <div class="card">
      <h3>Sign in</h3>
      <p class="subtle">Sign in with a Board Night account from the production API.</p>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" />
      <div class="btn-row">
        <button class="btn" id="loginBtn">Sign in</button>
        <button class="btn secondary" id="resetBtn">Clear session</button>
      </div>
    </div>

    <footer class="note">Board Night is connected to the production API server.</footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    ready(function () {
      document.getElementById("loginBtn").addEventListener("click", async function () {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          alert("Please enter your email and password.");
          return;
        }

        try {
          await DB.login(email, password);
          window.location.href = "dashboard.html";
        } catch (error) {
          alert(error.message);
        }
      });

      document.getElementById("resetBtn").addEventListener("click", function () {
        DB.reset();
        alert("Local session cleared.");
      });
    });
  </script>
</body>
</html>
